services:

  minio1:
    image:         minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio1
    hostname:      minio1
    command: server http://minio{1...4}:9000/data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:              minioadmin
      MINIO_ROOT_PASSWORD:          minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN:  "http://localhost:5173"
    volumes:
      - minio1-data:/data
    networks:
      - minio-net
    ports:
      - "9100:9000"
    healthcheck:
      test:         ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval:     5s
      timeout:      5s
      retries:      12
      start_period: 30s

  minio2:
    image:         minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio2
    hostname:      minio2
    command: server http://minio{1...4}:9000/data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:              minioadmin
      MINIO_ROOT_PASSWORD:          minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN:  "http://localhost:5173"
    volumes:
      - minio2-data:/data
    networks:
      - minio-net
    ports:
      - "9101:9000"
    healthcheck:
      test:         ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval:     5s
      timeout:      5s
      retries:      12
      start_period: 30s

  minio3:
    image:         minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio3
    hostname:      minio3
    command: server http://minio{1...4}:9000/data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:              minioadmin
      MINIO_ROOT_PASSWORD:          minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN:  "http://localhost:5173"
    volumes:
      - minio3-data:/data
    networks:
      - minio-net
    ports:
      - "9102:9000"
    healthcheck:
      test:         ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval:     5s
      timeout:      5s
      retries:      12
      start_period: 30s

  minio4:
    image:         minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio4
    hostname:      minio4
    command: server http://minio{1...4}:9000/data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:              minioadmin
      MINIO_ROOT_PASSWORD:          minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN:  "http://localhost:5173"
    volumes:
      - minio4-data:/data
    networks:
      - minio-net
    ports:
      - "9103:9000"
    healthcheck:
      test:         ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval:     5s
      timeout:      5s
      retries:      12
      start_period: 30s

  nginx:
    build:
      context: ./nginx
    container_name: minio-nginx
    ports:
      - "9000:9000"
      - "9001:9001"
    depends_on:
      minio1: { condition: service_healthy }
      minio2: { condition: service_healthy }
      minio3: { condition: service_healthy }
      minio4: { condition: service_healthy }
    networks:
      - minio-net

networks:
  minio-net:
    driver: bridge

volumes:
  minio1-data:
  minio2-data:
  minio3-data:
  minio4-data: