# ─────────────────────────────────────────────────────────────────────────────
#  nginx.conf  —  MinIO 4-node load balancer
#
#  Two upstreams:
#    minio_api     → port 9000  (S3 API,       least_conn)
#    minio_console → port 9001  (Web Console,  ip_hash for sticky sessions)
#
#  Two server blocks:
#    :9000  S3 API proxy     — large uploads, no buffering, Host header preserved
#    :9001  Console proxy    — WebSocket support (console uses WS for live updates)
#
#  Why "proxy_set_header Host $http_host" matters:
#    Presigned URLs embed the host in the HMAC signature. If nginx rewrites the
#    Host header, MinIO's signature check fails with a 403. $http_host passes
#    the client's original Host (e.g. "localhost:9000") straight through.
# ─────────────────────────────────────────────────────────────────────────────

events {
  worker_connections 1024;
}

http {

  # ── S3 API upstream ─────────────────────────────────────────────────────────
  # least_conn: sends new requests to the node with fewest active connections.
  # Good for uploads — a node handling a large in-flight PUT won't pile up more.
  # max_fails / fail_timeout: nginx stops routing to a node after 3 consecutive
  # failures, waits 10 s, then retries. Complements MinIO's own quorum handling.
  upstream minio_api {
    least_conn;
    server minio1:9000 max_fails=3 fail_timeout=10s;
    server minio2:9000 max_fails=3 fail_timeout=10s;
    server minio3:9000 max_fails=3 fail_timeout=10s;
    server minio4:9000 max_fails=3 fail_timeout=10s;
  }

  # ── Console upstream ─────────────────────────────────────────────────────────
  # ip_hash: a client always hits the same node. The Console authenticates via a
  # JWT session — if requests bounce between nodes the session token can fail.
  upstream minio_console {
    ip_hash;
    server minio1:9001;
    server minio2:9001;
    server minio3:9001;
    server minio4:9001;
  }

  # ── S3 API  (:9000) ──────────────────────────────────────────────────────────
  server {
    listen 9000;

    # Unlimited upload size (0 = no limit). Without this, nginx rejects
    # anything larger than the default 1 MB client_max_body_size.
    client_max_body_size 0;

    location / {
      proxy_pass http://minio_api;

      # Preserve the original Host header — required for presigned URL validation.
      proxy_set_header Host              $http_host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Don't buffer the request or response body.
      # With buffering on, nginx would hold the entire upload in memory/disk
      # before forwarding to MinIO — defeats the point of streaming uploads.
      proxy_request_buffering off;
      proxy_buffering         off;

      # Generous timeouts for large files.
      proxy_connect_timeout 300s;
      proxy_send_timeout    300s;
      proxy_read_timeout    300s;
    }
  }

  # ── MinIO Console  (:9001) ───────────────────────────────────────────────────
  server {
    listen 9001;

    location / {
      proxy_pass http://minio_console;

      proxy_set_header Host              $http_host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # WebSocket upgrade — the Console uses WS for real-time cluster metrics.
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
    }
  }
}